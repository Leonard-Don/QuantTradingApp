services:
  - type: web
    name: quanttrading-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    plan: starter
    disk:
      name: quanttrading-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: QUANTTRADING_DB_PATH
        value: /data/quanttrading.db
      - key: QUANTTRADING_REQUIRE_CALLBACK_SIGNATURE
        value: "1"
      - key: QUANTTRADING_PAYMENT_CALLBACK_SECRET
        sync: false
