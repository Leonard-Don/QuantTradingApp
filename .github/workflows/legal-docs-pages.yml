name: Publish legal docs to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/legal/**'
      - '.github/workflows/legal-docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Render legal docs to HTML
        run: |
          set -euo pipefail
          mkdir -p _site/legal
          cat > _site/legal/_style.css <<'CSS'
          body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;max-width:780px;margin:32px auto;padding:0 20px;color:#17202a;line-height:1.7}
          h1{font-size:1.8rem;border-bottom:1px solid #d9dee7;padding-bottom:8px;margin-top:0}
          h2{font-size:1.25rem;margin-top:2rem}
          h3{font-size:1.05rem}
          code,pre{background:#f4f6fa;border-radius:4px;padding:2px 6px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
          pre{padding:12px;overflow-x:auto}
          table{border-collapse:collapse;width:100%;margin:1rem 0}
          th,td{border:1px solid #d9dee7;padding:8px 10px;text-align:left;vertical-align:top}
          th{background:#f1f4f8}
          a{color:#0a66c2}
          footer{margin-top:3rem;color:#637083;font-size:0.85rem;border-top:1px solid #edf0f4;padding-top:1rem}
          CSS

          for src in docs/legal/*.md; do
            base="$(basename "$src" .md)"
            out="_site/legal/${base}.html"
            pandoc "$src" \
              --from gfm \
              --to html5 \
              --standalone \
              --metadata title="${base}" \
              --css _style.css \
              --output "$out"
          done

          # Simple index page so /legal/ is browseable.
          {
            echo '<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TianXianQuant Legal</title><link rel="stylesheet" href="_style.css"></head><body>'
            echo '<h1>TianXianQuant 法律文档</h1>'
            echo '<ul>'
            for src in docs/legal/*.md; do
              base="$(basename "$src" .md)"
              echo "  <li><a href=\"${base}.html\">${base}</a></li>"
            done
            echo '</ul>'
            echo '<footer>Generated by GitHub Actions from <code>docs/legal/*.md</code>.</footer>'
            echo '</body></html>'
          } > _site/legal/index.html

          # Root index simply redirects to /legal/.
          cat > _site/index.html <<'HTML'
          <!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=legal/"><title>TianXianQuant</title></head><body><p><a href="legal/">TianXianQuant 法律文档</a></p></body></html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
