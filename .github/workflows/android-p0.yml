name: Android P0

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify TianXianQuant
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install XML and Android SDK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          python -m pip install -r backend/requirements.txt

      - name: Verify P0
        run: TianXianQuant/scripts/verify_p0.sh

      - name: Verify backend contract scaffold
        run: scripts/verify_backend.sh

      - name: Build release APK and AAB
        run: TianXianQuant/scripts/build_release_artifacts.sh
