name: Release Gate

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this gate is being run (release tag, RC, ad-hoc audit)"
        required: false
        default: "manual"
  push:
    tags:
      - "release-*"

jobs:
  paid-release-gate:
    name: Verify paid release configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform components
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Materialize release keystore
        env:
          QUANTTRADING_RELEASE_KEYSTORE_BASE64: ${{ secrets.QUANTTRADING_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${QUANTTRADING_RELEASE_KEYSTORE_BASE64:-}" ]; then
            echo "QUANTTRADING_RELEASE_KEYSTORE_BASE64 secret is required" >&2
            exit 1
          fi
          printf '%s' "$QUANTTRADING_RELEASE_KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/quanttrading-release.jks"
          chmod 600 "${{ runner.temp }}/quanttrading-release.jks"

      - name: Run paid release configuration gate
        env:
          QUANTTRADING_PRODUCTION_API_BASE_URL: ${{ secrets.QUANTTRADING_PRODUCTION_API_BASE_URL }}
          QUANTTRADING_PRIVACY_POLICY_URL: ${{ secrets.QUANTTRADING_PRIVACY_POLICY_URL }}
          QUANTTRADING_TERMS_URL: ${{ secrets.QUANTTRADING_TERMS_URL }}
          QUANTTRADING_DATA_DISCLAIMER_URL: ${{ secrets.QUANTTRADING_DATA_DISCLAIMER_URL }}
          QUANTTRADING_SUPPORT_EMAIL: ${{ secrets.QUANTTRADING_SUPPORT_EMAIL }}
          QUANTTRADING_RELEASE_KEYSTORE: ${{ runner.temp }}/quanttrading-release.jks
          QUANTTRADING_RELEASE_STORE_PASSWORD: ${{ secrets.QUANTTRADING_RELEASE_STORE_PASSWORD }}
          QUANTTRADING_RELEASE_KEY_ALIAS: ${{ secrets.QUANTTRADING_RELEASE_KEY_ALIAS }}
          QUANTTRADING_RELEASE_KEY_PASSWORD: ${{ secrets.QUANTTRADING_RELEASE_KEY_PASSWORD }}
        run: scripts/verify_paid_release_config.sh
